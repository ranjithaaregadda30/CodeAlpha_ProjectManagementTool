<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Management Tool</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background:#f4f6f9;
        }

        header{
            background:#4a69bd;
            color:white;
            padding:20px;
            text-align:center;
            font-size:28px;
            font-weight:bold;
        }

        .container{
            width:90%;
            margin:20px auto;
        }

        .project-form{
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 2px 5px rgba(0,0,0,0.1);
            margin-bottom:20px;
        }

        .project-form input,
        .project-form textarea{
            width:100%;
            padding:10px;
            margin-top:10px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        .project-form button{
            margin-top:10px;
            padding:10px 20px;
            background:#4a69bd;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        .boards{
            display:flex;
            gap:20px;
            flex-wrap:wrap;
        }

        .board{
            background:white;
            width:300px;
            min-height:400px;
            padding:15px;
            border-radius:10px;
            box-shadow:0 2px 5px rgba(0,0,0,0.1);
        }

        .board h2{
            text-align:center;
            margin-bottom:15px;
            color:#333;
        }

        .task{
            background:#eef1f7;
            padding:15px;
            border-radius:8px;
            margin-bottom:15px;
        }

        .task h3{
            margin-bottom:10px;
        }

        .task p{
            font-size:14px;
            margin-bottom:10px;
        }

        .task small{
            display:block;
            margin-bottom:10px;
            color:gray;
        }

        .comment-section input{
            width:100%;
            padding:8px;
            margin-top:5px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        .comment-section button{
            margin-top:5px;
            padding:7px 12px;
            background:#38ada9;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        ul{
            margin-top:10px;
            padding-left:20px;
        }

        .assign{
            color:#e55039;
            font-weight:bold;
        }

    </style>
</head>

<body>

<header>
    Project Management Tool
</header>

<div class="container">

    <!-- Create Task Form -->

    <div class="project-form">

        <h2>Create Task</h2>

        <input type="text" id="taskTitle" placeholder="Task Title">

        <textarea id="taskDesc" placeholder="Task Description"></textarea>

        <input type="text" id="assignedUser" placeholder="Assign To">

        <button onclick="createTask()">Add Task</button>

    </div>

    <!-- Boards -->

    <div class="boards">

        <!-- To Do Board -->

        <div class="board">

            <h2>To Do</h2>

            <div id="todoBoard"></div>

        </div>

    </div>

</div>

<script>

    function createTask(){

        const title =
            document.getElementById("taskTitle").value;

        const desc =
            document.getElementById("taskDesc").value;

        const assigned =
            document.getElementById("assignedUser").value;

        if(title.trim() === "" || desc.trim() === ""){

            alert("Please fill all fields");

            return;
        }

        const taskDiv =
            document.createElement("div");

        taskDiv.classList.add("task");

        taskDiv.innerHTML = `

            <h3>${title}</h3>

            <p>${desc}</p>

            <small class="assign">
                Assigned To: ${assigned}
            </small>

            <div class="comment-section">

                <input type="text"
                placeholder="Add comment">

                <button onclick="addComment(this)">
                    Comment
                </button>

                <ul></ul>

            </div>
        `;

        document
            .getElementById("todoBoard")
            .appendChild(taskDiv);

        // Clear inputs

        document.getElementById("taskTitle").value = "";

        document.getElementById("taskDesc").value = "";

        document.getElementById("assignedUser").value = "";
    }

    function addComment(button){

        const input =
            button.previousElementSibling;

        const text = input.value;

        if(text.trim() === ""){

            alert("Enter comment");

            return;
        }

        const ul =
            button.nextElementSibling;

        const li =
            document.createElement("li");

        li.innerText = text;

        ul.appendChild(li);

        input.value = "";
    }

</script>

</body>
</html>
